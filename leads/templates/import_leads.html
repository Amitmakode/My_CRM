<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PropCRM — Import Leads</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Sora', sans-serif; background: #F5F5F7; min-height: 100vh; padding: 24px 16px; display: flex; align-items: flex-start; justify-content: center; }

.page-wrap { width: 100%; max-width: 500px; }

.back-btn { display: inline-flex; align-items: center; gap: 6px; color: #8E8E93; font-size: 13px; font-weight: 600; text-decoration: none; margin-bottom: 20px; }

.card { background: white; border-radius: 16px; border: 1px solid #E8E8EC; padding: 28px 24px; margin-bottom: 16px; }

.card-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
.card-sub { font-size: 13px; color: #8E8E93; margin-bottom: 24px; }

.upload-area {
  border: 2px dashed #E8E8EC; border-radius: 12px;
  padding: 32px; text-align: center; cursor: pointer;
  transition: all 0.2s; margin-bottom: 20px;
}

.upload-area:hover { border-color: #FF6B35; background: #FFF3EE; }
.upload-area i { font-size: 32px; color: #FF6B35; margin-bottom: 12px; display: block; }
.upload-area .upload-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.upload-area .upload-sub { font-size: 12px; color: #8E8E93; }

input[type="file"] { display: none; }

.format-card { background: #F5F5F7; border-radius: 12px; padding: 16px; margin-bottom: 20px; }
.format-title { font-size: 12px; font-weight: 700; color: #8E8E93; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.format-code { font-size: 11px; color: #1C1C1E; font-family: monospace; background: white; padding: 10px 12px; border-radius: 8px; border: 1px solid #E8E8EC; overflow-x: auto; white-space: nowrap; }

.save-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #FF6B35, #FF9A3C); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; box-shadow: 0 4px 12px rgba(255,107,53,0.3); }

#file-name { font-size: 13px; color: #FF6B35; font-weight: 600; margin-top: 8px; text-align: center; }
</style>
</head>
<body>

<div class="page-wrap">
  <a href="{% url 'dashboard' %}" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>

  <div class="card">
    <div class="card-title">Import Leads</div>
    <div class="card-sub">Upload a CSV file to bulk import leads</div>

    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <label for="csv-file">
        <div class="upload-area" id="upload-area">
          <i class="fas fa-cloud-upload-alt"></i>
          <div class="upload-title">Click to upload CSV file</div>
          <div class="upload-sub">Only .csv files supported</div>
        </div>
      </label>
      <input type="file" name="file" id="csv-file" accept=".csv" onchange="showFileName(this)">
      <div id="file-name"></div>

      <div class="format-card">
        <div class="format-title">CSV Format</div>
        <div class="format-code">name,phone,alternate_phone,city,email,source,property_type,bhk,location_preference,budget_min,budget_max,pipeline,temperature,notes</div>
      </div>

      <button class="save-btn"><i class="fas fa-upload"></i> Import Leads</button>
    </form>
  </div>
</div>

<script>
function showFileName(input) {
  const name = input.files[0] ? input.files[0].name : '';
  document.getElementById('file-name').textContent = name ? '✓ ' + name + ' selected' : '';
  if (name) {
    document.getElementById('upload-area').style.borderColor = '#FF6B35';
    document.getElementById('upload-area').style.background = '#FFF3EE';
  }
}
</script>

</body>
</html>
