<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PropCRM — Manage Users</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Sora', sans-serif; background: #F5F5F7; min-height: 100vh; padding: 24px 16px; }

.page-wrap { max-width: 700px; margin: 0 auto; }

.back-btn { display: inline-flex; align-items: center; gap: 6px; color: #8E8E93; font-size: 13px; font-weight: 600; text-decoration: none; margin-bottom: 20px; }

.page-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.page-title { font-size: 22px; font-weight: 800; }

.add-btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; background: linear-gradient(135deg, #FF6B35, #FF9A3C); color: white; border-radius: 10px; font-size: 13px; font-weight: 700; text-decoration: none; box-shadow: 0 4px 12px rgba(255,107,53,0.3); }

.card { background: white; border-radius: 16px; border: 1px solid #E8E8EC; overflow: hidden; }

.user-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-bottom: 1px solid #F5F5F7; }
.user-row:last-child { border-bottom: none; }

.user-info { display: flex; align-items: center; gap: 12px; }

.ava { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, #FF6B35, #FF9A3C); color: white; font-weight: 800; font-size: 15px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

.uname { font-size: 14px; font-weight: 700; }
.umeta { font-size: 12px; color: #8E8E93; margin-top: 2px; }

.role-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; background: #EDFAF1; color: #34C759; }
</style>
</head>
<body>

<div class="page-wrap">
  <a href="{% url 'dashboard' %}" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>

  <div class="page-hdr">
    <div class="page-title">Manage Users</div>
    <a href="{% url 'create_user' %}" class="add-btn"><i class="fas fa-plus"></i> Add User</a>
  </div>

  <div class="card">
    {% for user in users %}
    <div class="user-row">
      <div class="user-info">
        <div class="ava">{{ user.username|first|upper }}</div>
        <div>
          <div class="uname">{{ user.username }}</div>
          <div class="umeta">Joined {{ user.date_joined|date:"d M Y" }}</div>
        </div>
      </div>
      <span class="role-badge">Sales User</span>
    </div>
    {% empty %}
    <div style="padding:32px;text-align:center;color:#8E8E93;font-size:13px;">No users yet. <a href="{% url 'create_user' %}" style="color:#FF6B35;text-decoration:none;font-weight:600;">Add one →</a></div>
    {% endfor %}
  </div>
</div>

</body>
</html>
